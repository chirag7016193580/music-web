    <!-- ========== MAIN CONTENT ========== -->
    <div class="main-content" id="main-content">
        <div class="bg-blur" id="bg-blur"></div>

        <!-- Sticky Top Bar -->
        <div class="topbar" id="topbar">
            <i class="fas fa-bars" id="mobile-menu-btn" onclick="toggleMobileMenu()"></i>

            <div class="topbar-right">
                <button id="install-btn" onclick="installPWA()"><i class="fas fa-download"></i> <span>Install</span></button>
                <div class="user-profile" id="user-profile-btn" onclick="showProfileModal()">
                    <img id="profile-img" src="https://i.pravatar.cc/100?img=11" alt="User" loading="lazy">
                    <span id="profile-name">Guest</span>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="songInput" placeholder="What do you want to listen to?" autocomplete="off">
                    <button class="search-btn" onclick="searchMusic()"><i class="fas fa-arrow-right"></i></button>
                </div>
                <div id="search-history-dropdown" class="search-dropdown"></div>
            </div>
        </div>

        <!-- Category Pills -->
        <div class="category-pills" id="category-pills"></div>

        <h1 id="page-title" class="hidden-title">Welcome</h1>
