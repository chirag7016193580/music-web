    <!-- ========== BOTTOM PLAYER ========== -->
    <div class="bottom-player" id="bottom-player-area">
        <div class="now-playing" title="Open Full Screen" onclick="toggleImmersivePlayer();">
            <img id="np-img" src="" alt="Album Art">
            <div class="song-info">
                <h4 id="np-title">Not Playing</h4>
                <p id="np-artist">-</p>
            </div>
            <div class="np-actions">
                <button class="action-btn" id="add-pl-btn" onclick="showAddToPlaylistModal(event); event.stopPropagation();" title="Add to Playlist"><i class="fas fa-plus-circle"></i></button>
                <button class="like-btn" id="like-btn" onclick="toggleLike(event); event.stopPropagation();"><i class="fas fa-heart"></i></button>
                <button class="download-btn" id="download-btn" onclick="toggleDownload(event); event.stopPropagation();" title="Download"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-btns">
                <button class="ctrl-icon" id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle"><i class="fas fa-shuffle"></i></button>
                <button class="ctrl-icon" onclick="prevSong()" title="Previous"><i class="fas fa-backward-step"></i></button>
                <button class="main-play-btn" id="play-pause-btn" onclick="togglePlay()"><i class="fas fa-play play-icon"></i></button>
                <button class="ctrl-icon" onclick="nextSong()" title="Next"><i class="fas fa-forward-step"></i></button>
                <button class="ctrl-icon" id="repeat-btn" onclick="toggleRepeat()" title="Repeat"><i class="fas fa-repeat"></i></button>
            </div>
            <div class="progress-area">
                <span id="current-time">0:00</span>
                <div class="slider-container">
                    <div class="slider-fill" id="progress-fill"></div>
                    <div class="slider-thumb" id="progress-thumb"></div>
                    <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1" oninput="seekAudio()">
                </div>
                <span id="total-time">0:00</span>
            </div>
            <audio id="global-audio" src="" crossorigin="anonymous"></audio>
        </div>

        <div class="extra-controls">
            <button class="action-btn" id="share-btn-bottom" onclick="showShareModal()" title="Share"><i class="fas fa-share-alt"></i></button>
            <button class="action-btn" id="mode-hd-btn" onclick="toggleHDMode()" title="HD Audio"><i class="fas fa-gem"></i></button>
            <button class="action-btn" id="mode-4d-btn" onclick="toggle4DMode()" title="3D Surround"><i class="fas fa-cube"></i></button>
            <button class="action-btn" id="immersive-btn" onclick="toggleImmersivePlayer()" title="Now Playing"><i class="fas fa-expand"></i></button>
            <button class="action-btn" id="queue-btn" onclick="toggleQueue()" title="Queue"><i class="fas fa-stream"></i></button>

            <div class="volume-area">
                <i class="fas fa-volume-high" id="vol-icon" onclick="toggleMute()"></i>
                <div class="slider-container vol-slider">
                    <div class="slider-fill" id="vol-fill"></div>
                    <input type="range" id="volume-bar" value="100" min="0" max="100" step="1" oninput="handleVolumeChange()">
                </div>
            </div>

            <div class="playback-speed" id="speed-control" onclick="cyclePlaybackSpeed()" title="Playback Speed">
                <span id="speed-label">1x</span>
            </div>
        </div>
    </div>
